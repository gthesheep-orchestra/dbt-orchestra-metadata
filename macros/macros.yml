version: 2

macros:
  - name: timestamp_diff_seconds
    description: >
      Returns the whole-second difference between two timestamp expressions in a
      warehouse-agnostic way. Use this macro instead of calling warehouse-native
      timestamp diff functions directly.
    arguments:
      - name: end_col
        type: string
        description: SQL expression representing the end timestamp.
      - name: start_col
        type: string
        description: SQL expression representing the start timestamp.

  - name: source_column_or_null
    description: >
      Returns the source column expression when it exists on the relation, or NULL
      when the column is not present in the current source schema.
    arguments:
      - name: relation
        type: relation
        description: Source relation to introspect.
      - name: column_name
        type: string
        description: Column name to select when available.

  - name: most_common_value
    description: >
      Returns the most frequent non-null value from an expression using
      adapter-specific SQL.
    arguments:
      - name: expression
        type: string
        description: SQL expression to aggregate.

  - name: get_run_status_color
    description: >
      Returns a color string corresponding to a run status value.
      Useful for conditional formatting in BI tools that support
      color-coded status fields.
    arguments:
      - name: status_column
        type: string
        description: >
          SQL expression or column reference containing a run/task/operation
          status value (e.g. SUCCEEDED, FAILED, WARNING, RUNNING, etc.).

  - name: json_array_length
    description: >
      Returns the number of elements in a JSON array column using
      adapter-specific SQL. Supports BigQuery, Snowflake, Redshift,
      PostgreSQL, DuckDB, and Databricks.
    arguments:
      - name: column_name
        type: string
        description: SQL expression referencing the JSON array column.
