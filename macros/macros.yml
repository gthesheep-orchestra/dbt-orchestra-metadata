version: 2

macros:
  - name: timestamp_diff_seconds
    description: >
      Returns the whole-second difference between two timestamp expressions in a
      warehouse-agnostic way. Use this macro instead of calling warehouse-native
      timestamp diff functions directly.
    arguments:
      - name: end_col
        type: string
        description: SQL expression representing the end timestamp.
      - name: start_col
        type: string
        description: SQL expression representing the start timestamp.

  - name: source_column_or_null
    description: >
      Returns the source column expression when it exists on the relation, or NULL
      when the column is not present in the current source schema.
    arguments:
      - name: relation
        type: relation
        description: Source relation to introspect.
      - name: column_name
        type: string
        description: Column name to select when available.

  - name: most_common_value
    description: >
      Returns the most frequent non-null value from an expression using
      adapter-specific SQL.
    arguments:
      - name: expression
        type: string
        description: SQL expression to aggregate.

  - name: json_array_length
    description: >
      Returns the number of elements in a JSON array column in a
      warehouse-agnostic way. Dispatches to adapter-specific implementations
      for Snowflake, BigQuery, Postgres, Redshift, DuckDB, and Databricks.
    arguments:
      - name: column_name
        type: string
        description: SQL expression or column name containing the JSON array string.

  - name: get_run_status_color
    description: >
      Returns a color code string for a given Orchestra run status value.
      Useful for conditional formatting in BI tools. Maps SUCCEEDED to green,
      FAILED to red, WARNING to yellow, RUNNING to blue, CANCELLED/CANCELLING
      to orange, and all other statuses (CREATED, QUEUED, SKIPPED) to gray.
    arguments:
      - name: status_column
        type: string
        description: SQL expression or column name containing the status value.
