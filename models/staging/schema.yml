version: 2

sources:
  - name: orchestra
    description: |
      Orchestra metadata ingested via dlt from the Orchestra REST API.
      Data is loaded incrementally with a 7-day lookback window.
    schema: "{{ var('orchestra_source_schema', 'orchestra') }}"
    database: "{{ var('orchestra_source_database', none) }}"

    tables:
      - name: pipeline_runs
        description: |
          Pipeline run metadata from the Orchestra API `/pipeline_runs` endpoint.
          Contains information about each pipeline execution including status,
          timing, and git context (branch/commit).

          API supports incremental loading via `time_from` and `time_to` parameters
          with a maximum 7-day range per request.
        columns:
          - name: id
            description: Unique identifier for the pipeline run (UUID4)
            data_tests:
              - unique
              - not_null
          - name: pipeline_id
            description: Identifier of the pipeline that was run (UUID4)
            data_tests:
              - not_null
          - name: pipeline_name
            description: Human-readable name of the pipeline
          - name: run_status
            description: |
              Current status of the pipeline run.
              Valid values: CREATED, RUNNING, SUCCEEDED, WARNING, FAILED, CANCELLING, CANCELLED
            data_tests:
              - accepted_values:
                  values: ['CREATED', 'RUNNING', 'SUCCEEDED', 'WARNING', 'FAILED', 'CANCELLING', 'CANCELLED']
          - name: triggered_by
            description: User or system that initiated the pipeline run
          - name: created_at
            description: Timestamp when the pipeline run was created (ISO 8601)
          - name: updated_at
            description: Timestamp of the last update to the pipeline run (ISO 8601)
          - name: completed_at
            description: Timestamp when the pipeline run completed (ISO 8601), null if still running
          - name: started_at
            description: Timestamp when the pipeline run started execution (ISO 8601)
          - name: branch
            description: Git branch the pipeline ran from
          - name: commit
            description: Git commit SHA the pipeline ran from
          - name: _dlt_load_id
            description: dlt load identifier for tracking ingestion batches
          - name: _dlt_id
            description: dlt unique row identifier
        freshness:
          warn_after: {count: 24, period: hour}
          error_after: {count: 48, period: hour}
        loaded_at_field: _dlt_load_id

      - name: task_runs
        description: |
          Task run metadata from the Orchestra API `/task_runs` endpoint.
          Contains detailed information about individual task executions within pipelines,
          including integration details and execution status.

          API supports incremental loading via `time_from` and `time_to` parameters
          with a maximum 7-day range per request.
        columns:
          - name: id
            description: Unique identifier for the task run (UUID4)
            data_tests:
              - unique
              - not_null
          - name: task_name
            description: Name of the task that was executed
          - name: status
            description: |
              Current status of the task run.
              Valid values: CREATED, SKIPPED, QUEUED, RUNNING, SUCCEEDED, WARNING, FAILED, CANCELLING, CANCELLED
            data_tests:
              - accepted_values:
                  values: ['CREATED', 'SKIPPED', 'QUEUED', 'RUNNING', 'SUCCEEDED', 'WARNING', 'FAILED', 'CANCELLING', 'CANCELLED']
          - name: integration
            description: Integration type used by this task (e.g., dbt, Fivetran, Snowflake)
          - name: integration_job
            description: Specific job or operation within the integration
          - name: message
            description: Status message or error details for the task run
          - name: external_status
            description: Status reported by the external integration
          - name: pipeline_run_id
            description: ID of the parent pipeline run (UUID4)
          - name: created_at
            description: Timestamp when the task run was created (ISO 8601)
          - name: updated_at
            description: Timestamp of the last update (ISO 8601)
          - name: completed_at
            description: Timestamp when the task completed (ISO 8601)
          - name: started_at
            description: Timestamp when the task started execution (ISO 8601)
          - name: _dlt_load_id
            description: dlt load identifier for tracking ingestion batches
          - name: _dlt_id
            description: dlt unique row identifier
        freshness:
          warn_after: {count: 24, period: hour}
          error_after: {count: 48, period: hour}
        loaded_at_field: _dlt_load_id

      - name: operations
        description: |
          Operation details from the Orchestra API `/operations` endpoint.
          Contains granular information about individual operations within task runs,
          including metrics like rows affected and duration.

          API supports incremental loading via `time_from` and `time_to` parameters
          with a maximum 7-day range per request.
        columns:
          - name: id
            description: Unique identifier for the operation
            data_tests:
              - unique
              - not_null
          - name: operation_name
            description: Name of the operation
          - name: operation_status
            description: |
              Status of the operation.
              Valid values: CREATED, QUEUED, RUNNING, SUCCEEDED, WARNING, FAILED, SKIPPED, UNKNOWN, CANCELLING, CANCELING, CANCELLED
            data_tests:
              - accepted_values:
                  values: ['CREATED', 'QUEUED', 'RUNNING', 'SUCCEEDED', 'WARNING', 'FAILED', 'SKIPPED', 'UNKNOWN', 'CANCELLING', 'CANCELING', 'CANCELLED']
          - name: operation_type
            description: |
              Type of operation performed.
              Valid values: AGGREGATION, ANALYSIS, DEPLOY, INGESTION, ITERATOR,
              MATERIALISATION, OPERATION, QUERY, REVERSE_ETL, SEED, SNAPSHOT,
              SOURCE, TEST, TEST_GROUP, TRIGGER, UNKNOWN
            data_tests:
              - accepted_values:
                  values: ['AGGREGATION', 'ANALYSIS', 'DEPLOY', 'INGESTION', 'ITERATOR', 'MATERIALISATION', 'OPERATION', 'QUERY', 'REVERSE_ETL', 'SEED', 'SNAPSHOT', 'SOURCE', 'TEST', 'TEST_GROUP', 'TRIGGER', 'UNKNOWN']
          - name: integration
            description: Integration type that performed the operation
          - name: integration_job
            description: Specific job within the integration
          - name: rows_affected
            description: Number of rows affected by the operation
          - name: operation_duration
            description: Duration of the operation in seconds
          - name: task_run_id
            description: ID of the parent task run (UUID4)
          - name: external_id
            description: External identifier from the integration
          - name: created_at
            description: Timestamp when the operation was created (ISO 8601)
          - name: _dlt_load_id
            description: dlt load identifier for tracking ingestion batches
          - name: _dlt_id
            description: dlt unique row identifier
        freshness:
          warn_after: {count: 24, period: hour}
          error_after: {count: 48, period: hour}
        loaded_at_field: _dlt_load_id

      - name: assets
        description: |
          Asset metadata from the Orchestra API `/assets` endpoint.
          Contains information about data assets tracked by Orchestra including
          tables, views, dashboards, and their dependencies.

          Note: This endpoint does not support time-based incremental loading.
          Data is sorted by `created_in_integration` descending.
        columns:
          - name: asset_id
            description: Unique identifier for the asset
            data_tests:
              - unique
              - not_null
          - name: asset_name
            description: Name of the asset
          - name: asset_type
            description: |
              Type of asset.
              Valid values: DASHBOARD, DASHBOARD_VIEWS, DATASET, QUERIES, TABLE, UNKNOWN, VIEW, WORKBOOK
            data_tests:
              - accepted_values:
                  values: ['DASHBOARD', 'DASHBOARD_VIEWS', 'DATASET', 'QUERIES', 'TABLE', 'UNKNOWN', 'VIEW', 'WORKBOOK']
          - name: integration
            description: Integration where the asset resides
          - name: external_id
            description: External identifier for the asset in its native system
          - name: status
            description: Current status of the asset
          - name: upstream_dependencies
            description: JSON array of upstream asset dependencies
          - name: downstream_dependencies
            description: JSON array of downstream asset dependencies
          - name: row_count
            description: Number of rows in the asset (for tables/views)
          - name: bytes
            description: Size of the asset in bytes
          - name: created_in_integration
            description: Timestamp when the asset was created in the integration
          - name: _dlt_load_id
            description: dlt load identifier for tracking ingestion batches
          - name: _dlt_id
            description: dlt unique row identifier

models:
  - name: stg_orchestra__pipeline_runs
    description: |
      Staged pipeline run data from Orchestra.
      Renames columns to consistent naming convention, adds calculated duration,
      and creates boolean flags for common status checks.
    columns:
      - name: pipeline_run_id
        description: Unique identifier for the pipeline run
        data_tests:
          - unique
          - not_null
      - name: pipeline_id
        description: Identifier of the pipeline definition
        data_tests:
          - not_null
      - name: pipeline_name
        description: Human-readable name of the pipeline
      - name: run_status
        description: Current status of the pipeline run
        data_tests:
          - accepted_values:
              values: ['CREATED', 'RUNNING', 'SUCCEEDED', 'WARNING', 'FAILED', 'CANCELLING', 'CANCELLED']
      - name: triggered_by
        description: User or system that initiated the run
      - name: git_branch
        description: Git branch the pipeline ran from
      - name: git_commit_sha
        description: Git commit SHA the pipeline ran from
      - name: created_at_utc
        description: Timestamp when the pipeline run was created
        data_tests:
          - not_null
      - name: started_at_utc
        description: Timestamp when execution started
      - name: updated_at_utc
        description: Timestamp of last status update
      - name: completed_at_utc
        description: Timestamp when execution completed
      - name: duration_seconds
        description: Total execution duration in seconds
      - name: is_successful
        description: Whether the run completed successfully
      - name: is_failed
        description: Whether the run failed
      - name: is_in_progress
        description: Whether the run is still executing
      - name: is_cancelled
        description: Whether the run was cancelled
      - name: has_warning
        description: Whether the run completed with warnings
      - name: _dlt_load_id
        description: dlt ingestion batch identifier
      - name: _dlt_id
        description: dlt unique row identifier

  - name: stg_orchestra__task_runs
    description: |
      Staged task run data from Orchestra.
      Contains individual task executions within pipeline runs with
      integration details and status information.
    columns:
      - name: task_run_id
        description: Unique identifier for the task run
        data_tests:
          - unique
          - not_null
      - name: pipeline_run_id
        description: ID of the parent pipeline run
        data_tests:
          - relationships:
              to: ref('stg_orchestra__pipeline_runs')
              field: pipeline_run_id
              config:
                severity: warn
      - name: task_name
        description: Name of the task
      - name: task_status
        description: Current status of the task run
        data_tests:
          - accepted_values:
              values: ['CREATED', 'SKIPPED', 'QUEUED', 'RUNNING', 'SUCCEEDED', 'WARNING', 'FAILED', 'CANCELLING', 'CANCELLED']
      - name: integration
        description: Integration type (e.g., dbt, Fivetran)
      - name: integration_job
        description: Specific job within the integration
      - name: status_message
        description: Status or error message
      - name: external_status
        description: Status from the external integration
      - name: created_at_utc
        description: Timestamp when the task run was created
        data_tests:
          - not_null
      - name: started_at_utc
        description: Timestamp when execution started
      - name: updated_at_utc
        description: Timestamp of last status update
      - name: completed_at_utc
        description: Timestamp when execution completed
      - name: duration_seconds
        description: Total execution duration in seconds
      - name: is_successful
        description: Whether the task completed successfully
      - name: is_failed
        description: Whether the task failed
      - name: is_in_progress
        description: Whether the task is still executing
      - name: is_cancelled
        description: Whether the task was cancelled
      - name: is_skipped
        description: Whether the task was skipped
      - name: has_warning
        description: Whether the task completed with warnings
      - name: _dlt_load_id
        description: dlt ingestion batch identifier
      - name: _dlt_id
        description: dlt unique row identifier

  - name: stg_orchestra__operations
    description: |
      Staged operation data from Orchestra.
      Contains granular operation-level details including metrics
      like rows affected and execution duration.
    columns:
      - name: operation_id
        description: Unique identifier for the operation
        data_tests:
          - unique
          - not_null
      - name: task_run_id
        description: ID of the parent task run
        data_tests:
          - relationships:
              to: ref('stg_orchestra__task_runs')
              field: task_run_id
              config:
                severity: warn
      - name: external_id
        description: External identifier from the integration
      - name: operation_name
        description: Name of the operation
      - name: operation_status
        description: Status of the operation
        data_tests:
          - accepted_values:
              values: ['SUCCEEDED', 'FAILED', 'SKIPPED', 'UNKNOWN', 'WARNING', 'CANCELLED']
      - name: operation_type
        description: Type of operation performed
        data_tests:
          - accepted_values:
              values: ['AGGREGATION', 'ANALYSIS', 'DEPLOY', 'INGESTION', 'ITERATOR', 'MATERIALISATION', 'OPERATION', 'QUERY', 'REVERSE_ETL', 'SEED', 'SNAPSHOT', 'SOURCE', 'TEST', 'TEST_GROUP', 'TRIGGER', 'UNKNOWN']
      - name: integration
        description: Integration that performed the operation
      - name: integration_job
        description: Specific job within the integration
      - name: rows_affected
        description: Number of rows affected
      - name: duration_seconds
        description: Operation duration in seconds
      - name: created_at_utc
        description: Timestamp when the operation was created
        data_tests:
          - not_null
      - name: is_successful
        description: Whether the operation succeeded
      - name: is_failed
        description: Whether the operation failed
      - name: is_skipped
        description: Whether the operation was skipped
      - name: has_warning
        description: Whether the operation had warnings
      - name: is_cancelled
        description: Whether the operation was cancelled
      - name: is_ingestion_operation
        description: Whether this is a data ingestion operation
      - name: is_transformation_operation
        description: Whether this is a transformation operation
      - name: is_testing_operation
        description: Whether this is a testing operation
      - name: is_deployment_operation
        description: Whether this is a deployment operation
      - name: _dlt_load_id
        description: dlt ingestion batch identifier
      - name: _dlt_id
        description: dlt unique row identifier

  - name: stg_orchestra__assets
    description: |
      Staged asset metadata from Orchestra.
      Contains information about data assets including tables, views,
      dashboards, and their dependency relationships.
    columns:
      - name: asset_id
        description: Unique identifier for the asset
        data_tests:
          - unique
          - not_null
      - name: external_id
        description: External identifier in the source system
      - name: asset_name
        description: Name of the asset
      - name: asset_type
        description: Type of asset
        data_tests:
          - accepted_values:
              values: ['DASHBOARD', 'DASHBOARD_VIEWS', 'DATASET', 'QUERIES', 'TABLE', 'UNKNOWN', 'VIEW', 'WORKBOOK']
      - name: integration
        description: Integration where the asset resides
      - name: asset_status
        description: Current status of the asset
      - name: upstream_dependencies
        description: JSON array of upstream dependencies
      - name: downstream_dependencies
        description: JSON array of downstream dependencies
      - name: row_count
        description: Number of rows (for tables/views)
      - name: size_bytes
        description: Size in bytes
      - name: size_gb
        description: Size in gigabytes
      - name: created_at_utc
        description: Timestamp when created in the integration
      - name: is_database_object
        description: Whether this is a table or view
      - name: is_bi_asset
        description: Whether this is a BI/dashboard asset
      - name: is_query_asset
        description: Whether this is a query/dataset asset
      - name: _dlt_load_id
        description: dlt ingestion batch identifier
      - name: _dlt_id
        description: dlt unique row identifier
