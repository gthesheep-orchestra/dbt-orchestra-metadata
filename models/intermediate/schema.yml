version: 2

models:
  - name: int_pipeline_runs_context
    description: |
      Intermediate model providing pipeline context fields for joining in downstream
      fact tables (fct_task_runs, fct_operations).

      Extracts the minimal set of pipeline identifiers and context attributes from
      stg_orchestra__pipeline_runs to avoid direct staging-layer fanout in mart models.
      This resolves the fct_model_fanout evaluator violation on stg_orchestra__pipeline_runs.
    columns:
      - name: pipeline_run_id
        description: Unique identifier for the pipeline run
        data_tests:
          - unique
          - not_null
      - name: pipeline_id
        description: Identifier of the pipeline definition
        data_tests:
          - not_null
      - name: pipeline_name
        description: Human-readable name of the pipeline
      - name: git_branch
        description: Git branch the pipeline ran from
      - name: git_commit_sha
        description: Git commit SHA the pipeline ran from
